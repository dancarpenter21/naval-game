# Server unit tests + client lint/build — same as ./scripts/docker-tests.sh (no host Rust/Node).
name: Tests (Docker)

on:
  # All branch pushes (feature branches get CI before a PR exists).
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  # Same commit can trigger push + pull_request; one run per workflow per SHA.
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  docker-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Server + client checks via Docker Compose
        run: sh ./scripts/docker-tests.sh
