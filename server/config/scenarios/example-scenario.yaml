# Example scenario: one red surface unit vs one blue air unit.
# Entity templates: config/entities/example-red-ship.yaml (frigate),
#                   config/entities/example-blue-airplane.yaml (blue-airplane),
#                   config/entities/example-blue-missile.yaml (blue-missile),
#                   config/entities/example-satellite.yaml (example-satellite).
name: "Basic Encounter"
description: |
  A hostile surface combatant is operating near a friendly air asset.
  Use this scenario to exercise basic tracking and coordination between red and blue forces.
objectives:
  blue:
    - id: avoid_engagement
      type: survive_time
      params:
        duration_s: 3600
      required: true
      description: "Maintain positive identification and avoid engagement for 1 hour."
  red:
    - id: patrol_box
      type: survive_time
      params:
        duration_s: 1800
      required: true
      description: "Complete patrol box without being neutralized."
red_entities:
  - id: frigate
    lat_deg: 34.8
    lon_deg: -39.2
    hae_ft: 0.0
    heading_deg: 95.0
blue_entities:
  # Air tracks: same WGS84 HAE (ft) for fixed-wing and carried stores (~10 km ≈ FL330).
  - id: blue-airplane
    lat_deg: 35.4
    lon_deg: -40.1
    hae_ft: 32808.4
    heading_deg: 275.0
    hardpoints:
      hp1: blue-missile
      hp2: blue-missile
      hp3: blue-missile
      hp4: blue-missile
  - example-satellite
  - id: pentagon
    lat_deg: 38.8710
    lon_deg: -77.0559
    hae_ft: 0.0
    heading_deg: 0.0
spawns: []
