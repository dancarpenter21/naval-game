- id: blue-missile
  name: Blue Missile
  allegiance: friendly
  components:
    - kind: transform
      data:
        # Default starting pose for the demo missile.
        lat_deg: 35.6
        lon_deg: -40.0
        hae_m: 1000.0
        heading_deg: 270.0
    - kind: movement
      data:
        # Demo speed for missiles (knots).
        max_speed_knots: 1400.0
        acceleration: 1.0
    - kind: symbol
      data:
        sidc_template:
          version: "10"
          context: reality
          standard_identity: friend
          symbol_set: missile
          status: present
          hqtfd: not_applicable
          amplifier: unspecified
          # Any valid 6-digit entity code will deserialize (milsymbol may or may not
          # draw the exact ordnance glyph depending on milsymbol mappings).
          entity: code_110000
          modifier_one: code_00
          modifier_two: code_00
# Compiled hyphenated SIDC (seg1-seg2-…-seg10): 10-0-3-02-0-0-00-110000-00-00

