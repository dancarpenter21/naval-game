- id: blue-airplane
  name: Blue Example Airplane
  allegiance: friendly
  components:
    - kind: movement
      data:
        # Fixed-wing example speed.
        max_speed_knots: 480.0
        acceleration: 2.0
        skip_land_mask: true
    - kind: symbol
      data:
        sidc_template:
          version: "10"
          context: reality
          standard_identity: friend
          symbol_set: air
          status: present
          hqtfd: not_applicable
          amplifier: unspecified
          entity: code_110103
          modifier_one: code_00
          modifier_two: code_00
    # Loadout only: missiles are not spawned as world entities until launch (future fire event).
    - kind: hardpoints
      data:
        mounts:
          - id: hp1
            allowed_entity_ids: [blue-missile]
          - id: hp2
            allowed_entity_ids: [blue-missile]
          - id: hp3
            allowed_entity_ids: [blue-missile]
          - id: hp4
            allowed_entity_ids: [blue-missile]
