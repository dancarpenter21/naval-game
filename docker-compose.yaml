services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    #ports:
    #  - "3001:3001"
    volumes:
      - ./server:/app
      - cargo-registry:/usr/local/cargo/registry
      - ./server/target:/app/target
    environment:
      - PORT=3001
      # Debug per-tick logs require enabling DEBUG in RUST_LOG (currently set to `info`).
      - RUST_LOG=info
    networks:
      - tess_net

  # Full Rust test suite once, then exit (CI / local check).
  #   docker compose --profile tests run --rm server-test
  server-test:
    build:
      context: ./server
      dockerfile: Dockerfile
    profiles:
      - tests
    volumes:
      - ./server:/app
      - cargo-registry:/usr/local/cargo/registry
      - ./server/target:/app/target
    environment:
      - RUST_LOG=info
    networks:
      - tess_net
    command: cargo test

  # Watch mode: re-run the full suite on source changes.
  #   docker compose --profile tests up server-tests
  server-tests:
    build:
      context: ./server
      dockerfile: Dockerfile
    profiles:
      - tests
    init: true
    volumes:
      - ./server:/app
      - cargo-registry:/usr/local/cargo/registry
      - ./server/target:/app/target
    environment:
      - RUST_LOG=info
    networks:
      - tess_net
    command: >
      cargo watch -x "test"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    #ports:
    #  - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_SOCKET_PATH=/socket.io
      - VITE_APP_ORIGIN=http://localhost:8080
      - VITE_HMR_HOST=localhost
      - VITE_HMR_CLIENT_PORT=8080
      - VITE_APP_AUTO_OPEN=false
    networks:
      - tess_net

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./proxy/nginx.conf.template:/etc/nginx/nginx.conf.template
    depends_on:
      - client
      - server
    networks:
      - tess_net
    environment:
      - HOST_HOSTNAME=${HOSTNAME}
    command: >
      /bin/sh -c "envsubst '$$HOST_HOSTNAME' < /etc/nginx/nginx.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

volumes:
  cargo-registry:

networks:
  tess_net:
    driver: bridge