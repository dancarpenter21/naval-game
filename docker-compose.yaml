services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    #ports:
    #  - "3001:3001"
    volumes:
      - ./server:/app
      - cargo-registry:/usr/local/cargo/registry
      - ./server/target:/app/target
    environment:
      - PORT=3001
      # Debug per-tick logs require enabling DEBUG in RUST_LOG (currently set to `info`).
      - RUST_LOG=info
      # Simulation wall-clock: ticks per second (`2^4` default; max `2^6`=64). Range 1–64.
      - SIM_TICK_HZ=16
    networks:
      - tess_net

  # Full Rust test suite once, then exit (CI / local check).
  #   docker compose --profile tests run --rm server-test
  server-test:
    build:
      context: ./server
      dockerfile: Dockerfile
    profiles:
      - tests
    volumes:
      - ./server:/app
      - cargo-registry:/usr/local/cargo/registry
      - ./server/target:/app/target
    environment:
      - RUST_LOG=info
    networks:
      - tess_net
    command: cargo test

  # Watch mode: re-run the full suite on source changes.
  #   docker compose --profile tests up server-tests
  server-tests:
    build:
      context: ./server
      dockerfile: Dockerfile
    profiles:
      - tests
    init: true
    volumes:
      - ./server:/app
      - cargo-registry:/usr/local/cargo/registry
      - ./server/target:/app/target
    environment:
      - RUST_LOG=info
    networks:
      - tess_net
    command: >
      cargo watch -x "test"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    #ports:
    #  - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_SOCKET_PATH=/socket.io
      - VITE_APP_ORIGIN=http://localhost:8080
      - VITE_HMR_HOST=localhost
      - VITE_HMR_CLIENT_PORT=8080
      - VITE_APP_AUTO_OPEN=false
      # Shown as player name in chat / player list (browsers cannot read OS login); defaults to shell USER when set here.
      - VITE_PLAYER_NAME=${USER:-player}
      # Set true for Cypress E2E (see docker-compose.e2e.yml) — avoids Vite HMR ws to localhost when visiting http://nginx
      - VITE_DISABLE_HMR=${VITE_DISABLE_HMR:-false}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://127.0.0.1:5173/',{headers:{Host:'client'}},(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 180s
    networks:
      - tess_net

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./proxy/nginx.conf.template:/etc/nginx/nginx.conf.template
    depends_on:
      client:
        condition: service_healthy
      server:
        condition: service_started
    networks:
      - tess_net
    environment:
      - HOST_HOSTNAME=${HOSTNAME}
    command: >
      /bin/sh -c "envsubst '$$HOST_HOSTNAME' < /etc/nginx/nginx.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  # E2E UI tests (Cypress) — nothing installed on the host; image bundles Cypress.
  #   docker compose --profile e2e up -d nginx
  #   docker compose --profile e2e run --rm cypress
  # Or CI: see .github/workflows/e2e.yml
  cypress:
    image: cypress/included:14.3.2
    profiles:
      - e2e
    depends_on:
      - nginx
    networks:
      - tess_net
    working_dir: /app
    volumes:
      - ./client:/app
    environment:
      - CYPRESS_baseUrl=http://nginx
    entrypoint: ["/bin/sh", "/app/scripts/docker-e2e.sh"]

volumes:
  cargo-registry:

networks:
  tess_net:
    driver: bridge