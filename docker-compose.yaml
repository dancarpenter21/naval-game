services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    #ports:
    #  - "3001:3001"
    volumes:
      - ./server:/app
      - cargo-registry:/usr/local/cargo/registry
      - ./server/target:/app/target
    environment:
      - PORT=3001
      - RUST_LOG=info
    networks:
      - tess_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    #ports:
    #  - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_SOCKET_PATH=/socket.io
    networks:
      - tess_net
    
  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./proxy/nginx.conf.template:/etc/nginx/nginx.conf.template
    depends_on:
      - client
      - server
    networks:
      - tess_net
    environment:
      - HOST_HOSTNAME=${HOSTNAME}
    command: >
      /bin/sh -c "envsubst '$$HOST_HOSTNAME' < /etc/nginx/nginx.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

volumes:
  cargo-registry:

networks:
  tess_net:
    driver: bridge